# .github/workflows/sync-poam.yml
# ─────────────────────────────────────────────────────────────────────
# DISCO POA&M — Nightly Jira Sync
# ─────────────────────────────────────────────────────────────────────
# Runs on a schedule (default: 06:00 UTC daily) and on manual dispatch.
# Fetches all DISCO project issues from Jira Cloud, updates the POA&M
# HTML artifact, commits the change back to the repo, and (optionally)
# deploys to GitHub Pages.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets → Actions):
#   JIRA_EMAIL   — your Atlassian account email
#   JIRA_TOKEN   — API token from id.atlassian.com/manage-profile/security/api-tokens
#
# OPTIONAL VARIABLES (Settings → Variables → Actions):
#   JIRA_BASE    — default: https://fiveforty.atlassian.net
#   JIRA_PROJECT — default: DISCO
#   POAM_FILE    — default: Digital_Binder_Tier1_POAM_v3.html
# ─────────────────────────────────────────────────────────────────────

name: Sync POA&M from Jira

on:
  schedule:
    # 06:00 UTC daily — adjust to a time after your team's EOD
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab in GitHub
    inputs:
      dry_run:
        description: 'Dry run (print changes but do not commit)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # needed to commit the updated HTML back to the repo
  pages: write      # needed only if deploying to GitHub Pages
  id-token: write   # needed only if deploying to GitHub Pages

jobs:
  sync-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      JIRA_EMAIL:   ${{ secrets.JIRA_EMAIL }}
      JIRA_TOKEN:   ${{ secrets.JIRA_TOKEN }}
      JIRA_BASE:    ${{ vars.JIRA_BASE    || 'https://fiveforty.atlassian.net' }}
      JIRA_PROJECT: ${{ vars.JIRA_PROJECT || 'DISCO' }}
      POAM_FILE:    ${{ vars.POAM_FILE    || 'Digital_Binder_Tier1_POAM_v3.html' }}

    steps:
      # ── 1. Check out the repository ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Use a deploy key or the default GITHUB_TOKEN (read/write)
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      # ── 4. Run the sync script ────────────────────────────────────
      - name: Sync Jira data into POA&M
        run: |
          DRYRUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRYRUN_FLAG="--dry-run"
          fi
          python sync_poam.py $DRYRUN_FLAG

      # ── 5. Commit the updated HTML (skip if dry run or no changes) ─
      - name: Commit updated POA&M
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$POAM_FILE"
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes detected — Jira board unchanged since last sync."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: sync POA&M from Jira DISCO [${TIMESTAMP}]"
            git push
            echo "POA&M committed and pushed."
          fi

  # ── Optional: deploy to GitHub Pages ────────────────────────────
  # Remove this job entirely if you are not using GitHub Pages.
  deploy-pages:
    needs: sync-and-commit
    if: ${{ inputs.dry_run != 'true' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout updated repo
        uses: actions/checkout@v5
        with:
          ref: main   # pull the commit we just pushed

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v5
        with:
          # Serve the root; adjust path if your HTML lives in a subdirectory
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
